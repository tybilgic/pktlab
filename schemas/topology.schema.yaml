$schema: https://json-schema.org/draft/2020-12/schema
$id: https://pktlab.local/schemas/topology.schema.yaml
title: pktlab topology configuration
description: Shared topology configuration contract for pktlab controller and CLI input.
type: object
additionalProperties: false
required:
  - lab
  - processes
  - namespaces
  - links
  - dpdk_ports
  - routes
  - rules
  - capture_points
properties:
  lab:
    $ref: "#/$defs/Lab"
  processes:
    $ref: "#/$defs/Processes"
  namespaces:
    type: array
    items:
      $ref: "#/$defs/Namespace"
  links:
    type: array
    items:
      $ref: "#/$defs/Link"
  dpdk_ports:
    type: array
    minItems: 2
    items:
      $ref: "#/$defs/DpdkPort"
  routes:
    type: array
    items:
      $ref: "#/$defs/Route"
  rules:
    $ref: "#/$defs/Ruleset"
  capture_points:
    type: array
    items:
      $ref: "#/$defs/CapturePoint"
$defs:
  NonEmptyString:
    type: string
    minLength: 1
  IPv4WithPrefix:
    type: string
    pattern: "^(?:\\d{1,3}\\.){3}\\d{1,3}/\\d{1,2}$"
  IPv4Address:
    type: string
    pattern: "^(?:\\d{1,3}\\.){3}\\d{1,3}$"
  NamespaceInterfaceRef:
    type: string
    pattern: "^[A-Za-z0-9._-]+:[A-Za-z0-9._-]+$"
  RuleProtocol:
    type: string
    enum:
      - tcp
      - udp
      - icmp
      - any
  RuleActionType:
    type: string
    enum:
      - forward
      - drop
      - count
      - mirror
  PortRole:
    type: string
    enum:
      - ingress
      - egress
  Lab:
    type: object
    additionalProperties: false
    required:
      - name
    properties:
      name:
        $ref: "#/$defs/NonEmptyString"
  DpdkProcess:
    type: object
    additionalProperties: false
    required:
      - namespace
    properties:
      namespace:
        $ref: "#/$defs/NonEmptyString"
      lcores:
        type: string
        minLength: 1
      hugepages_mb:
        type: integer
        minimum: 2
      burst_size:
        type: integer
        minimum: 1
      rx_queue_size:
        type: integer
        minimum: 1
      tx_queue_size:
        type: integer
        minimum: 1
      mempool_size:
        type: integer
        minimum: 1
  ControllerProcess:
    type: object
    additionalProperties: false
    properties:
      rest_listen:
        $ref: "#/$defs/NonEmptyString"
      metrics_listen:
        $ref: "#/$defs/NonEmptyString"
  Processes:
    type: object
    additionalProperties: false
    required:
      - dpdkd
    properties:
      dpdkd:
        $ref: "#/$defs/DpdkProcess"
      ctrld:
        $ref: "#/$defs/ControllerProcess"
  Namespace:
    type: object
    additionalProperties: false
    required:
      - name
    properties:
      name:
        $ref: "#/$defs/NonEmptyString"
  Link:
    type: object
    additionalProperties: false
    required:
      - name
      - a
      - b
    properties:
      name:
        $ref: "#/$defs/NonEmptyString"
      a:
        $ref: "#/$defs/NamespaceInterfaceRef"
      b:
        $ref: "#/$defs/NamespaceInterfaceRef"
      ip_a:
        $ref: "#/$defs/IPv4WithPrefix"
      ip_b:
        $ref: "#/$defs/IPv4WithPrefix"
  DpdkPort:
    type: object
    additionalProperties: false
    required:
      - name
      - namespace
      - role
    properties:
      name:
        $ref: "#/$defs/NonEmptyString"
      namespace:
        $ref: "#/$defs/NonEmptyString"
      role:
        $ref: "#/$defs/PortRole"
  Route:
    type: object
    additionalProperties: false
    required:
      - namespace
      - dst
      - via
    properties:
      namespace:
        $ref: "#/$defs/NonEmptyString"
      dst:
        $ref: "#/$defs/IPv4WithPrefix"
      via:
        $ref: "#/$defs/IPv4Address"
  RuleMatch:
    type: object
    additionalProperties: false
    properties:
      proto:
        $ref: "#/$defs/RuleProtocol"
      src_ip:
        $ref: "#/$defs/IPv4Address"
      dst_ip:
        $ref: "#/$defs/IPv4Address"
      src_cidr:
        $ref: "#/$defs/IPv4WithPrefix"
      dst_cidr:
        $ref: "#/$defs/IPv4WithPrefix"
      src_port:
        type: integer
        minimum: 0
        maximum: 65535
      dst_port:
        type: integer
        minimum: 0
        maximum: 65535
  RuleAction:
    type: object
    additionalProperties: false
    required:
      - type
    properties:
      type:
        $ref: "#/$defs/RuleActionType"
      port:
        $ref: "#/$defs/NonEmptyString"
    allOf:
      - if:
          properties:
            type:
              enum:
                - forward
                - mirror
        then:
          required:
            - port
      - if:
          properties:
            type:
              enum:
                - drop
                - count
        then:
          not:
            required:
              - port
  Rule:
    type: object
    additionalProperties: false
    required:
      - id
      - priority
      - match
      - action
    properties:
      id:
        type: integer
        minimum: 0
      priority:
        type: integer
        minimum: 0
      match:
        $ref: "#/$defs/RuleMatch"
      action:
        $ref: "#/$defs/RuleAction"
  Ruleset:
    type: object
    additionalProperties: false
    required:
      - version
      - default_action
      - entries
    properties:
      version:
        type: integer
        minimum: 0
      default_action:
        $ref: "#/$defs/RuleAction"
      entries:
        type: array
        items:
          $ref: "#/$defs/Rule"
  CapturePoint:
    type: object
    additionalProperties: false
    required:
      - name
      - namespace
      - interface
    properties:
      name:
        $ref: "#/$defs/NonEmptyString"
      namespace:
        $ref: "#/$defs/NonEmptyString"
      interface:
        $ref: "#/$defs/NonEmptyString"
